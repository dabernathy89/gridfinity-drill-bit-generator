name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same PR/branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, format, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `vp check` runs oxfmt, oxlint, and tsgolint in one pass.
      - name: Format + lint + typecheck
        run: pnpm exec vp check

      - name: Tests
        run: pnpm exec vp test run
